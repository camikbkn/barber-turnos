<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbería Premium</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    text-align: center;
    background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.95)),
    url('https://images.unsplash.com/photo-1503951914875-452162b0f3f1');
    background-size: cover;
    background-position: center;
}

.container {
    padding: 20px;
}

h1 {
    font-size: 3em;
    color: #d4af37;
    margin-top: 20px;
}

.subtitle {
    font-size: 1.2em;
    color: #ccc;
    margin-bottom: 30px;
}

.section {
    background: rgba(0,0,0,0.75);
    margin: 20px auto;
    padding: 20px;
    border-radius: 15px;
    max-width: 420px;
    box-shadow: 0 0 15px rgba(212,175,55,0.3);
}

.section h2 {
    color: #d4af37;
    margin-bottom: 10px;
}

.price {
    font-size: 18px;
    margin: 8px 0;
}

.promo {
    background: #d4af37;
    color: black;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
    margin-top: 10px;
}

.btn {
    display: inline-block;
    margin-top: 25px;
    padding: 18px 28px;
    background: #25D366;
    color: white;
    font-size: 20px;
    text-decoration: none;
    border-radius: 12px;
    transition: 0.3s;
}

.btn:hover {
    background: #1ebe5d;
}

.footer {
    margin-top: 30px;
    font-size: 14px;
    color: #aaa;
}
</style>

</head>
<body>

<div class="container">

    <!-- TITULO -->
    <h1>✂️ Barbería EL CRACK</h1>
    <div class="subtitle">Estilo - Precisión - Calidad</div>

    <!-- SERVICIOS -->
    <div class="section">
        <h2>💈 Servicios</h2>
        <div class="price">Corte: $3000</div>
        <div class="price">Corte + Barba: $5000</div>
        <div class="price">Perfilado: $2000</div>
    </div>

    <!-- PROMOCIONES -->
    <div class="section">
        <h2>🔥 Promociones</h2>
        <div class="promo">Corte + Barba $4500</div>
        <div class="promo">2 Cortes $5000</div>
    </div>

    <!-- HORARIOS -->
    <div class="section">
        <h2>🕐 Horarios</h2>
        <div>Lunes a Sábado</div>
        <div>10:00 a 20:00 hs</div>
    </div>

    <!-- BOTON WHATSAPP -->
    <a class="btn" 
       href="https://wa.me/549XXXXXXXXXX?text=Hola%20quiero%20reservar%20un%20turno" 
       target="_blank">
        📲 Reservar turno por WhatsApp
    </a>

    <div class="footer">
        📍 Tu barrio - Argentina
    </div>

</div>

</body>
</html>
